<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <style>
        .field-error { color: red; }
        input.field-error { border-color: red; }
    </style>
</head>
<body>
<div class="container" style="max-width: 600px">
    <div class="py-5 text-center">
        <h2>회원 가입</h2>
    </div>
    <form th:action th:object="${member}" method="post">
        <div>
            <label for="loginId">로그인 ID</label>
            <input type="text" id="loginId" th:field="*{loginId}" class="form-control"
                   th:classappend="${#fields.hasErrors('loginId')} ? 'field-error'">
            <div class="field-error" th:errors="*{loginId}"></div>
        </div>
        <div>
            <label for="name">이름</label>
            <input type="text" id="name" th:field="*{name}" class="form-control"
                   th:classappend="${#fields.hasErrors('name')} ? 'field-error'">
            <div class="field-error" th:errors="*{name}"></div>
        </div>
        <div>
            <label for="password">비밀번호</label>
            <input type="password" id="password" th:field="*{password}" class="form-control"
                   th:classappend="${#fields.hasErrors('password')} ? 'field-error'">
            <div class="field-error" th:errors="*{password}"></div>
        </div>
        <hr class="my-4">
        <div class="row">
            <div class="col">
                <button class="btn btn-primary col-4" type="submit">회원 가입</button>
            </div>
            <div class="col">
                <button class="btn btn-secondary col-4 float-end"
                        th:onclick="|location.href='@{/}'|" type="button">취소</button>
            </div>
        </div>
    </form>
</div>
</body>
</html>
