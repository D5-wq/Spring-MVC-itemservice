<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <link th:href="@{/css/bootstrap.min.css}" href="../../static/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .field-error { color: red; }
        input.field-error { border-color: red; }
    </style>
</head>
<body>
<div class="container" style="max-width: 600px">
    <div class="py-5 text-center">
        <h2>상품 등록 폼</h2>
    </div>
    <h4 class="mb-3">상품 입력</h4>
    <form action="item.html" th:action th:object="${item}" method="post">

        <!-- 글로벌 오류 -->
        <div th:if="${#fields.hasGlobalErrors()}">
            <p class="field-error" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
        </div>

        <div>
            <label for="itemName">상품명</label>
            <input type="text" id="itemName" th:field="*{itemName}" class="form-control"
                   th:classappend="${#fields.hasErrors('itemName')} ? 'field-error'"
                   placeholder="이름을 입력하세요">
            <div class="field-error" th:errors="*{itemName}"></div>
        </div>
        <div>
            <label for="price">가격</label>
            <input type="text" id="price" th:field="*{price}" class="form-control"
                   th:classappend="${#fields.hasErrors('price')} ? 'field-error'"
                   placeholder="가격을 입력하세요">
            <div class="field-error" th:errors="*{price}"></div>
        </div>
        <div>
            <label for="quantity">수량</label>
            <input type="text" id="quantity" th:field="*{quantity}" class="form-control"
                   th:classappend="${#fields.hasErrors('quantity')} ? 'field-error'"
                   placeholder="수량을 입력하세요">
            <div class="field-error" th:errors="*{quantity}"></div>
        </div>
        <hr class="my-4">
        <div class="row">
            <div class="col">
                <button class="btn btn-primary col-4" type="submit">상품 등록</button>
            </div>
            <div class="col">
                <button class="btn btn-secondary col-4 float-end"
                        onclick="location.href='items.html'"
                        th:onclick="|location.href='@{/basic/items}'|"
                        type="button">취소</button>
            </div>
        </div>
    </form>
</div>
</body>
</html>
